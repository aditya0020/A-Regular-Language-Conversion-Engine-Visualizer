<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a6bcc"/>
      <stop offset="100%" stop-color="#0d3f7a"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <!-- TOC lines: representing a table of contents -->
  <!-- Line 1 - heading -->
  <rect x="6" y="7" width="14" height="2.5" rx="1.2" fill="#ffffff"/>
  <!-- Line 2 -->
  <rect x="8" y="12" width="11" height="2" rx="1" fill="#7eb8f7" opacity="0.9"/>
  <!-- Line 3 -->
  <rect x="8" y="16" width="14" height="2" rx="1" fill="#7eb8f7" opacity="0.9"/>
  <!-- Line 4 -->
  <rect x="8" y="20" width="9" height="2" rx="1" fill="#7eb8f7" opacity="0.9"/>

  <!-- Page number dots on right -->
  <circle cx="25" cy="13" r="1.2" fill="#ffffff" opacity="0.5"/>
  <circle cx="25" cy="17" r="1.2" fill="#ffffff" opacity="0.5"/>
  <circle cx="25" cy="21" r="1.2" fill="#ffffff" opacity="0.5"/>
</svg>
